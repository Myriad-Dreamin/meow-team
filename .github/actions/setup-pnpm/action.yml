name: Setup Node and pnpm
description: Install pnpm before enabling pnpm cache in setup-node.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "20"
  registry-url:
    description: Optional npm registry URL for authenticated installs.
    required: false
    default: ""
  scope:
    description: Optional npm scope used with the registry URL.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.16.1
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}
