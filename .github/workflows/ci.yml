name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build highlight dependency
        run: pnpm --filter @getpaseo/highlight run build

      - name: Build relay dependency
        run: pnpm --filter @getpaseo/relay run build

      - name: Build server dependency
        run: pnpm --filter @getpaseo/server run build

      - name: Typecheck all packages
        run: pnpm run typecheck

  server-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: server-tests (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Fetch origin/main (worktree tests)
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI for provider tests
        run: npm install -g @anthropic-ai/claude-code

      - name: Build highlight dependency
        run: pnpm --filter @getpaseo/highlight run build

      - name: Build relay dependency
        run: pnpm --filter @getpaseo/relay run build

      - name: Run server tests
        run: pnpm --filter @getpaseo/server run test
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  desktop-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build highlight dependency
        run: npm run build --workspace=@getpaseo/highlight

      - name: Build relay dependency
        run: npm run build --workspace=@getpaseo/relay

      - name: Build server dependency
        run: npm run build --workspace=@getpaseo/server

      - name: Run desktop tests
        run: pnpm --filter @getpaseo/desktop run test

  app-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @getpaseo/app exec playwright install --with-deps chromium

      - name: Build highlight dependency
        run: pnpm --filter @getpaseo/highlight run build

      - name: Run app unit tests
        run: pnpm --filter @getpaseo/app run test

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @getpaseo/app exec playwright install --with-deps chromium

      - name: Build highlight dependency
        run: pnpm --filter @getpaseo/highlight run build

      - name: Build relay dependency
        run: pnpm --filter @getpaseo/relay run build

      - name: Build server dependency
        run: pnpm --filter @getpaseo/server run build

      - name: Install agent CLIs for provider tests
        run: npm install -g @anthropic-ai/claude-code @openai/codex@0.105.0 opencode-ai

      - name: Run Playwright E2E tests
        run: pnpm --filter @getpaseo/app run test:e2e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            packages/app/test-results/
            packages/app/playwright-report/
          retention-days: 7

  relay-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build relay
        run: pnpm --filter @getpaseo/relay run build

      - name: Run relay tests
        run: pnpm --filter @getpaseo/relay run test

  cli-tests:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    runs-on: ubuntu-latest
    name: cli-tests (shard ${{ matrix.shard }}/3)
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install agent CLIs for provider tests
        run: npm install -g @anthropic-ai/claude-code @openai/codex@0.105.0 opencode-ai

      - name: Build highlight dependency
        run: pnpm --filter @getpaseo/highlight run build

      - name: Run CLI tests
        run: pnpm --filter @getpaseo/cli run test
        env:
          PASEO_LOCAL_SPEECH_AUTO_DOWNLOAD: "0"
          PASEO_DICTATION_ENABLED: "0"
          PASEO_VOICE_MODE_ENABLED: "0"
          PASEO_CLI_TEST_SHARD: ${{ matrix.shard }}
          PASEO_CLI_TEST_SHARD_TOTAL: "3"
