name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/server/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/server/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/server-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Fetch origin/main (worktree tests)
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Install server dependencies
        run: pnpm install --frozen-lockfile

      - name: Build highlight dependency
        run: pnpm --filter @getpaseo/highlight run build

      - name: Build relay dependency
        run: pnpm --filter @getpaseo/relay run build

      - name: Typecheck
        run: pnpm --filter @getpaseo/server run typecheck

      - name: Test
        run: pnpm --filter @getpaseo/server run test
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
